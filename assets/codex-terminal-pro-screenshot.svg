<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050">
  <defs>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: 700; fill: #f5f7f8; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 21px; font-weight: 700; fill: #202327; }
      .nav { font-family: Arial, Helvetica, sans-serif; font-size: 21px; font-weight: 700; fill: #25282c; }
      .nav-muted { fill: #7a7f85; }
      .terminal { font-family: "Courier New", Courier, monospace; font-size: 23px; font-weight: 700; fill: #c9c9c9; }
      .terminal-small { font-family: "Courier New", Courier, monospace; font-size: 22px; font-weight: 700; fill: #c9c9c9; }
      .terminal-muted { fill: #858585; }
      .terminal-dim { fill: #666666; }
      .terminal-cyan { fill: #64f2ef; }
      .terminal-green { fill: #b8e0b1; }
      .terminal-blue { fill: #9ebaff; }
      .terminal-yellow { fill: #d7c229; }
      .terminal-purple { fill: #d9a4ff; }
      .terminal-orange { fill: #f0a56e; }
    </style>
    <filter id="screenShadow" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1800" height="1050" fill="#f7f8f9"/>
  <g filter="url(#screenShadow)">
    <rect x="42" y="36" width="1716" height="978" rx="18" fill="#ffffff"/>
    <rect x="42" y="36" width="1716" height="978" rx="18" fill="none" stroke="#d8dde2" stroke-width="2"/>

    <rect x="42" y="36" width="344" height="978" rx="18" fill="#ffffff"/>
    <path d="M386 36 V1014" stroke="#d8dde2" stroke-width="2"/>
    <rect x="42" y="36" width="344" height="92" rx="18" fill="#ffffff"/>
    <path d="M42 128 H386" stroke="#e3e6e8" stroke-width="2"/>
    <text class="label" x="106" y="96">Home Assistant</text>
    <g transform="translate(66 78)" stroke="#7a7f85" stroke-width="4" stroke-linecap="round">
      <path d="M0 0 H20"/>
      <path d="M0 10 H20"/>
      <path d="M0 20 H12"/>
    </g>

    <g class="nav">
      <g transform="translate(0 0)">
        <rect x="62" y="168" width="26" height="26" rx="4" fill="#7b7f84"/>
